name: remote_control

services:
  api:
    image: remotecontrol-api:latest
    container_name: remotecontrol-api
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started

  db:
    image: postgres:18.4-alpine3.23
    container_name: postgres-database
    env_file: ./db/.env
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - pg_data:/var/lib/postgresql

volumes:
  pg_data:
