services:
  api:
    image: remotecontrol-api:latest
    container_name: remotecontrol-api
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - NAME
      - DB_HOST
      - DB_PORT
      - DB_NAME
      - DB_USER
      - DB_PASS
      - HTTP_PORT

  db:
    image: postgres:18.4-alpine3.23
    container_name: remotecontrol-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
