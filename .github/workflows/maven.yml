name: ci/cd pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'maven'
        
    - name: Build and Test with Maven
      run: mvn -B clean package --file pom.xml

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    permissions:
      contents: write   
      packages: write   

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'maven'

    # Get the version from pom file
    - name: Get SemVer from POM
      id: get_version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "POM_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Got SemVer $VERSION"

    # Check if release already exists
    - name: Check if release already exists
      id: release_check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view v${{ env.POM_VERSION }} &>/dev/null; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo ">> Version v${{ env.POM_VERSION }} has already been published. Subsequent steps will be skipped."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo ">> Version v${{ env.POM_VERSION }} is new! Proceeding to publish."
        fi

    # Generate a trunkver
    - name: Generate Trunkver
      if: steps.release_check.outputs.exists != 'true'
      id: generate_trunkver
      run: |
        COMMIT_TS=$(git show -s --format=%cd --date=format:'%Y%m%d%H%M%S' HEAD)
        SHORT_SHA=$(git rev-parse --short=7 HEAD)
        TRUNKVER="${COMMIT_TS}.0.0-g${SHORT_SHA}-${{ github.run_id }}"
        echo "TRUNKVER=$TRUNKVER" >> $GITHUB_ENV
        echo "Generated trunkver $TRUNKVER"
    
    # Create a github release
    - name: Create GitHub Release
      if: steps.release_check.outputs.exists != 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v${{ env.POM_VERSION }} --title "v${{ env.POM_VERSION }}" --generate-notes
    
    # Publish container to github registry
    - name: Publish with Maven via jib
      if: steps.release_check.outputs.exists != 'true'
      run: >
        mvn -B compile jib:build
        -Djib.serialize=true
        -Djib.to.auth.username=${{ github.actor }}
        -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
        -Djib.to.image=ghcr.io/george-haddad/remote-control-device:${{ env.POM_VERSION }}-${{ env.TRUNKVER }}
