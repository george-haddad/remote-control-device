changelog:
  categories:
    - title: "✨ Features"
      labels:
        - "feat"
    - title: "🐛 Bug Fixes"
      labels:
        - "fix"
    - title: "🚀 Performance Updates"
      labels:
        - "perf"
    - title: "🛠 Dependency & Build Updates"
      labels:
        - "build"
        - "ci"
    - title: "🧪 Testing"
      labels:
        - "test"
    - title: "📝 Documentation"
      labels:
        - "docs"
    - title: "📦 Other Changes"
      labels:
        - "*" # This is a catch-all for any PRs without the above labels
