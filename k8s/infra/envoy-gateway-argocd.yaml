apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-devices
  namespace: argocd
spec:
  project: default
  source:
    helm:
      skipCrds: true
      values: |
        envoyGateway:
          config:
            gateway:
              controllerName: gateway.envoyproxy.io/devices
    chart: gateway-helm
    repoURL: docker.io/envoyproxy
    targetRevision: v1.8.1
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system-devices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
